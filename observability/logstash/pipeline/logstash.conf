input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ "^{.*}$" {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  if [app][timestamp] {
    date {
      match => ["[app][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [app][service] {
    mutate {
      add_field => {
        "service_name" => "%{[app][service]}"
      }
    }
  } else if [container][labels][com_docker_compose_service] {
    mutate {
      add_field => {
        "service_name" => "%{[container][labels][com_docker_compose_service]}"
      }
    }
  }

  if [app][level] {
    mutate {
      add_field => {
        "log_level" => "%{[app][level]}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "suilens-logs-%{+YYYY.MM.dd}"
  }
}
