services:
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    volumes:
      - order_pgdata:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
      POSTGRES_DB: notifications
    volumes:
      - notification_pgdata:/var/lib/postgresql/data
    ports:
      - "5445:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    volumes:
      - inventory_pgdata:/var/lib/postgresql/data
    ports:
      - "5446:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16687:16686"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - catalog-service
      - inventory-service
      - order-service
      - notification-service
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    ports:
      - "3005:3000"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
    ports:
      - "9201:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.4
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.4
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5602:5601"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.4
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash

  catalog-service:
    build: ./services/catalog-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://catalog:catalog@catalog-db:5432/catalog
      SERVICE_NAME: catalog-service
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      catalog-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgres://inventory:inventory@inventory-db:5432/inventory
      CATALOG_SERVICE_URL: http://catalog-service:3001
      SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      inventory-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
      jaeger:
        condition: service_started

  order-service:
    build: ./services/order-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://orders:orders@order-db:5432/orders
      CATALOG_SERVICE_URL: http://catalog-service:3001
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      DEFAULT_BRANCH_CODE: KB-JKT-S
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      jaeger:
        condition: service_started

  notification-service:
    build: ./services/notification-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://notifications:notifications@notification-db:5432/notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build: ./frontend/suilens-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_CATALOG_API: http://localhost:3001
      VITE_INVENTORY_API: http://localhost:3004
      VITE_ORDER_API: http://localhost:3002
      VITE_NOTIFICATION_API: http://localhost:3003
      VITE_NOTIFICATION_WS: ws://localhost:3003/ws/notifications

volumes:
  catalog_pgdata:
  inventory_pgdata:
  order_pgdata:
  notification_pgdata:
  grafana_data:
  elasticsearch_data:
